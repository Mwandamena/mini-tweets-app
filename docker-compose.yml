  #     - mongodb

volumes:
  redis-data:
    driver: local
  mongo-data:
    driver: local
  postgres-data:
    driver: local
  mysql-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  tempo-data:
    driver: local

networks:
  mta-network:
    driver: bridge
