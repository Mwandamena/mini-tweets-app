services:
  # --- MESSAGING & CACHE ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: mta_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mta-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: mta_kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
      - "29093:29093"
    env_file:
      - ./apps/backend/services/AuthService/.env.docker
    networks:
      - mta-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:29093 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    env_file:
      - ./apps/backend/services/AuthService/.env.docker
    networks:
      - mta-network

  redis:
    image: redis:7.2-alpine
    container_name: mta_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - ./apps/backend/services/AuthService/.env.docker
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-admin}
      --appendonly yes
      --appendfilename "appendonly.aof"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - mta-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-admin}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:mta_redis:6379:0:${REDIS_PASSWORD:-admin}
      - HTTP_USER=${REDIS_UI_USER:-admin}
      - HTTP_PASSWORD=${REDIS_UI_PASSWORD:-admin}
    depends_on:
      - redis
    networks:
      - mta-network

  # --- DATABASES ---
  mongodb:
    image: mongo:latest
    container_name: mta_mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    ports:
      - "27017:27017"
    networks:
      - mta-network

  # API Gateway
  nginx-gateway:
    image: nginx:latest
    container_name: mta_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    # depends_on:
    # - auth-service
    # - users-service
    networks:
      - mta-network

  mta-gateway:
    build:
      context: .
      dockerfile: ./apps/backend/services/ApiGateway/Dockerfile
    container_name: mta-gateway
    restart: unless-stopped
    ports:
      - "2000:2000"
    env_file:
      - ./apps/backend/services/ApiGateway/.env.docker
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mta-network

  # Backend services
  mta-auth:
    build:
      context: .
      dockerfile: apps/backend/services/AuthService/DockerFile
    container_name: mta-auth
    restart: unless-stopped
    ports:
      - "2001:2001"
    env_file:
      - ./apps/backend/services/AuthService/.env.docker
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mta-network

  mta-users:
    build:
      context: .
      dockerfile: ./apps/backend/services/UserService/Dockerfile
    container_name: mta-users
    restart: unless-stopped
    ports:
      - "2002:2002"
    env_file:
      - ./apps/backend/services/UserService/.env.docker
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mta-network

  mta-tweets:
    build:
      context: .
      dockerfile: ./apps/backend/services/TweetService/Dockerfile
    container_name: mta_tweets
    restart: unless-stopped
    ports:
      - "2003:2003"
    env_file:
      - ./apps/backend/services/TweetService/.env.docker
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mta-network

  # notification-service:
  #   build:
  #     context: .
  #     dockerfile: ./apps/backend/services/MailService/DockerFile
  #   container_name: mta_notification
  #   restart: unless-stopped
  #   ports:
  #     - "2004:2004"
  #   volumes:
  #     - ./apps/backend/services/MailService:/app/apps/backend/services/MailService
  #     - ./packages:/app/packages
  #   env_file:
  #     - ./apps/backend/services/MailService/.env
  #   depends_on:
  #     kafka:
  #       condition: service_started
  #   networks:
  #     - mta-network

  # monitering and observability
  prometheus:
    image: prom/prometheus:latest
    container_name: mta_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mta-network

  tempo:
    image: grafana/tempo:latest
    container_name: mta-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "4317:4317"
    networks:
      - mta-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mta-redis-exporter
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD:-admin}@mta_redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mta-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: mta-kafka-exporter
    command: --kafka.server=mta_kafka:29093
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mta-network

  loki:
    image: grafana/loki:latest
    container_name: mta-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - mta-network

  promtail:
    image: grafana/promtail:latest
    container_name: mta-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - mta-network

  grafana:
    image: grafana/grafana:latest
    container_name: mta_grafana
    ports:
      - "8085:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana.json:/var/lib/grafana/dashboards/mta-services-overview.json:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - mta-network

  # mta-web:
