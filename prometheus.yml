global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "mta-api-gateway"
    static_configs:
      - targets: ["mta-gateway:2000"]

  - job_name: "mta-auth-service"
    static_configs:
      - targets: ["mta-auth:2001"]

  - job_name: "mta-user-service"
    static_configs:
      - targets: ["mta-users:2002"]

  - job_name: "mta-tweet-service"
    static_configs:
      - targets: ["mta-tweets:2003"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]
